<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ARVIO Dashboard</title>
  <meta name="description" content="Open the ARVIO dashboard for managing addons and ARVIO settings.">
  <link rel="canonical" href="https://arvio.tv/web/">
  <link rel="icon" href="/assets/arvio-icon-512.png" type="image/png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #09070d;
      --ink: #fffaf2;
      --muted: rgba(255, 250, 242, 0.68);
      --line: rgba(255, 250, 242, 0.12);
      --accent: #67b7ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; min-height: 100%; background: var(--bg); color: var(--ink); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { overflow: hidden; }
    .shell { width: 100vw; height: 100vh; display: grid; grid-template-rows: 56px 1fr; }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      background: rgba(9, 7, 13, 0.96);
      border-bottom: 1px solid var(--line);
    }
    .brand { display: inline-flex; align-items: center; gap: 10px; color: inherit; text-decoration: none; font-weight: 800; letter-spacing: 0.01em; }
    .mark { width: 34px; height: 28px; display: block; object-fit: contain; filter: drop-shadow(0 0 12px rgba(13, 240, 194, 0.2)); }
    .actions { display: inline-flex; align-items: center; gap: 14px; font-size: 13px; }
    .actions a { color: var(--muted); text-decoration: none; }
    .actions a:hover { color: var(--ink); }
    .open { color: var(--bg) !important; background: var(--ink); padding: 9px 14px; border-radius: 999px; font-weight: 700; }
    iframe { width: 100%; height: 100%; border: 0; background: var(--bg); }
    @media (max-width: 640px) {
      .shell { grid-template-rows: 52px 1fr; }
      .bar { padding: 0 12px; }
      .actions a:not(.open) { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="bar">
      <a class="brand" href="/">
        <img class="mark" src="../assets/arvio-mark.png" alt="" aria-hidden="true">
        <span>ARVIO Dashboard</span>
      </a>
      <nav class="actions" aria-label="Web app links">
        <a href="/">Main site</a>
        <a class="open" href="https://arvio-ui.web.app/" target="_blank" rel="noopener">Open direct</a>
      </nav>
    </header>
    <iframe
      src="https://arvio-ui.web.app/"
      title="ARVIO web app"
      allow="clipboard-read; clipboard-write; fullscreen"
      referrerpolicy="strict-origin-when-cross-origin">
    </iframe>
  </div>
</body>
</html>
